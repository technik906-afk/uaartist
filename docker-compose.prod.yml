# Продакшн-стек: nginx (TLS, статика, медиа) → gunicorn/Django → PostgreSQL.
# Запуск на сервере:  docker compose -f docker-compose.prod.yml up -d --build
# Секреты — в .env рядом (НЕ в git).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ВАЖНО: порт наружу не публикуем — БД видна только внутри docker-сети.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    env_file:
      - .env
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    # ВРЕМЯНКА (2026-07): дефолтный IP api.telegram.org (149.154.166.x)
    # заблокирован из сети Cloud.ru — уведомления молчали. Этот IP из другой
    # подсети Telegram отвечает. Если снова замолчат — проверить IP и/или
    # перевести уведомления на email (SMTP.bz), см. roadmap.
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Вшиваются в бандл при сборке (см. frontend/Dockerfile) — смена требует rebuild.
        NEXT_PUBLIC_API_BASE_URL: https://api.uaartist.ru/api/v1
        NEXT_PUBLIC_SITE_URL: https://www.uaartist.ru
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - media_data:/srv/media:ro
      - static_data:/srv/static:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_data:
  static_data:
  certbot_www:
  letsencrypt:

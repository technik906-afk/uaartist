# Витрина (www.uaartist.ru + apex), этап 1 — до выпуска TLS-сертификата:
# HTTP-прокси + ACME-челлендж. После выпуска сертификата этот файл
# заменяется на www-https.conf.example.

server {
    listen 80;
    server_name www.uaartist.ru uaartist.ru;

    # Валидация Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

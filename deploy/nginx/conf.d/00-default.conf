# Зона лимита логина в админку Django (используется в api.conf, этап 2):
# перебор паролей режем на nginx — у админки нет собственного rate limit.
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=10r/m;

# Заглушка по умолчанию: запросы с чужим Host не должны доходить до приложений.
# Кейс: чужой домен (therikky.su) через Cloudflare указывал на наш IP —
# nginx без default_server отдавал такие запросы первому 443-блоку (api),
# Django отбивал их DisallowedHost и слал письма админам.

server {
    listen 80 default_server;
    server_name _;
    return 444;  # закрыть соединение без ответа
}

server {
    listen 443 ssl default_server;
    server_name _;
    # Отклонить TLS-handshake с неизвестным SNI, сертификат не нужен (nginx >= 1.19.4).
    ssl_reject_handshake on;
}

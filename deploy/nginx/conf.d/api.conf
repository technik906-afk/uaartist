# Этап 1 (до выпуска TLS-сертификата): HTTP-прокси + ACME-челлендж.
# После выпуска сертификата этот файл заменяется на api-https.conf.example.

server {
    listen 80;
    server_name api.uaartist.ru _;

    client_max_body_size 20m;  # загрузка фото через админку

    # Валидация Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /srv/static/;
        expires 7d;
    }

    location /media/ {
        alias /srv/media/;
        expires 30d;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
